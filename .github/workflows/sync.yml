name: Sync Spam Number List

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest file from source repo
        run: |
          curl -o lista_numeros_spam.txt https://raw.githubusercontent.com/mv12star/lista-telefonos-spam/main/lista_numeros_spam.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lista_numeros_spam.txt
          git commit -m "Auto-sync spam list update" || echo "No changes to commit"
          git push
